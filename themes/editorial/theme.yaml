name: editorial
displayName: Editorial
version: 0.1.0
author: slidesmith
description: A text-driven theme for narrative presentations, reports, and book-style decks.
tags: [light, text-heavy, editorial, serif]
fits: [keynote, narrative-report, book-style]
constraints:
  - "Use h1 for the cover or chapter title (occupies significant space)"
  - "Use h2 for section headings. The body paragraph is the focus"
  - "Prefer paragraphs over images. Aim for 100–200 characters per slide"
samples:
  default: samples/sample.md
  ko: samples/sample.ko.md
  jp: samples/sample.jp.md
recommendedPrerenders: []
prerender:
  mermaid:
    theme: base
    backgroundColor: transparent
    themeVariables:
      primaryColor: "#f3eede"
      primaryTextColor: "#1a1714"
      primaryBorderColor: "#8c1c13"
      lineColor: "#6b5e51"
      secondaryColor: "#f7f1e3"
      tertiaryColor: "#fbf8f1"
      mainBkg: "#f3eede"
      clusterBkg: "#f7f1e3"
      clusterBorder: "#a89c8d"
      edgeLabelBackground: "#fbf8f1"
      textColor: "#1a1714"
      noteBkgColor: "#f3eede"
      noteTextColor: "#8c1c13"
      noteBorderColor: "#a89c8d"
      fontFamily: "Pretendard Variable, Pretendard, system-ui, sans-serif"
