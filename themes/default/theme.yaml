name: default
displayName: Default
version: 0.1.0
author: slidesmith
description: A clean, neutral general-purpose presentation theme — works for any topic.
tags: [neutral, clean, general]
fits: [general-talk, internal-update]
constraints:
  - "Use h1 for slide titles (one per slide)"
  - "Use h2 for section headers within a slide"
  - "Recommend 3–5 list items (avoid text overload)"
samples:
  default: samples/sample.md
  en: samples/sample.en.md
  jp: samples/sample.jp.md
recommendedPrerenders:
  - mermaid-cli
prerender:
  mermaid:
    theme: base
    backgroundColor: transparent
    themeVariables:
      primaryColor: "#fff7ed"
      primaryTextColor: "#0a0a0a"
      primaryBorderColor: "#ea580c"
      lineColor: "#525b66"
      secondaryColor: "#fafafa"
      tertiaryColor: "#ffffff"
      mainBkg: "#fff7ed"
      clusterBkg: "#fafafa"
      clusterBorder: "#9ca3af"
      edgeLabelBackground: "#ffffff"
      textColor: "#0a0a0a"
      noteBkgColor: "#fff7ed"
      noteTextColor: "#0a0a0a"
      noteBorderColor: "#ea580c"
      fontFamily: "Inter, system-ui, sans-serif"
