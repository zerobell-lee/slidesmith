name: pitch
displayName: Pitch
version: 0.1.0
author: slidesmith
description: A refined investor-pitch theme — Pretendard, paper-and-ink palette, weight-contrast emphasis, generous whitespace. Stripe/Linear-style restraint, no decorative effects.
tags: [pitch, startup, investor, refined, light]
fits: [investor-pitch, demo-day, sales-deck, product-launch]
constraints:
  - "Use h1 for the title or the BIG NUMBER on a stat slide; one per slide"
  - "Use h2 for slide titles and stat captions"
  - "Use <!-- _class: hero --> for the cover (pure black field, white display type)"
  - "Use <!-- _class: section --> for chapter dividers (h2 = mono section tag like '02', h1 = chapter title)"
  - "Use <!-- _class: stat --> for big-number / KPI slides (h1 = number, h2 = mono label)"
  - "Use <!-- _class: manifesto --> for single-statement slides (h1 = the statement, p = mono attribution)"
  - "Use <!-- _class: quote --> for testimonials"
  - "Emphasis: **bold** = weight contrast (900), *italic* = deep amber accent (no slant)"
  - "Use <!-- _class: figure-left --> or <!-- _class: figure-right --> for a character illustration / portrait / diagram paired side-by-side with body text (image fills ~42% of one column, h2/h3/p stack in the other)"
samples:
  default: samples/sample.md
  ko: samples/sample.ko.md
recommendedPrerenders:
  - mermaid-cli
prerender:
  mermaid:
    theme: base
    backgroundColor: transparent
    themeVariables:
      primaryColor: "#f6e9d2"
      primaryTextColor: "#2b271f"
      primaryBorderColor: "#d76a25"
      lineColor: "#5d564a"
      secondaryColor: "#f1ebd7"
      tertiaryColor: "#fbf6e8"
      mainBkg: "#f6e9d2"
      clusterBkg: "#f1ebd7"
      clusterBorder: "#a89e85"
      edgeLabelBackground: "#fbf6e8"
      textColor: "#2b271f"
      noteBkgColor: "#f6e9d2"
      noteTextColor: "#d76a25"
      noteBorderColor: "#a89e85"
      fontFamily: "Pretendard Variable, Pretendard, system-ui, sans-serif"
