name: garden
displayName: Garden
version: 0.1.0
author: slidesmith
description: Soft natural-light theme for lifestyle, wellness, sustainability talks. Warm cream paper, sage primary, terracotta secondary, deep botanical ink. Light weights, generous leading.
tags: [light, lifestyle, wellness, sustainability, natural]
fits: [brand-book, sustainability-report, wellness-talk, lifestyle-launch]
constraints:
  - "Use h1 for cover or chapter title (light weight, italic Latin allowed)"
  - "Use h2 for slide titles"
  - "Use h3 for kicker labels (rendered in mono uppercase, terracotta)"
  - "Use <!-- _class: hero --> for the cover"
  - "Use <!-- _class: section --> for chapter dividers (softer surface)"
  - "Use <!-- _class: stat --> for key numbers (italic serif, sage)"
  - "Use <!-- _class: manifesto --> for single-statement slides"
  - "Use <!-- _class: quote --> for testimonials"
  - "Emphasis: **bold** = weight contrast (600), *italic* = serif italic in sage (Latin only — Korean is never slanted)"
  - "Use <!-- _class: figure-left --> or <!-- _class: figure-right --> for a character illustration / portrait / diagram paired side-by-side with body text (image fills ~42% of one column, h2/h3/p stack in the other)"
samples:
  default: samples/sample.md
  ko: samples/sample.ko.md
recommendedPrerenders: []
prerender:
  mermaid:
    theme: base
    backgroundColor: transparent
    themeVariables:
      primaryColor: "#dde8d8"
      primaryTextColor: "#283c2e"
      primaryBorderColor: "#5a8765"
      lineColor: "#5a8765"
      secondaryColor: "#f0d2b9"
      tertiaryColor: "#f7f1de"
      mainBkg: "#dde8d8"
      clusterBkg: "#ece3cd"
      clusterBorder: "#9d9272"
      edgeLabelBackground: "#f7f1de"
      textColor: "#283c2e"
      noteBkgColor: "#f0d2b9"
      noteTextColor: "#283c2e"
      noteBorderColor: "#bd6f3e"
      fontFamily: "Pretendard Variable, Pretendard, system-ui, sans-serif"
